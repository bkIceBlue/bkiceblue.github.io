<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結帳 - 冰藍烘焙實驗室</title>
    <link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>
    <header class="site-header">
        <img class="logo-banner" src="images/logobanner.png" alt="冰藍烘焙實驗室">
    </header>

    <main>
        <section class="hero">
            <h1>結帳資料</h1>
        </section>

        <section class="checkout-layout">
            <form id="checkout-form" class="checkout-card checkout-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="customer-name">姓名 *</label>
                        <input id="customer-name" name="customerName" autocomplete="name" required>
                    </div>

                    <div class="form-group">
                        <label for="customer-phone">電話 *</label>
                        <input id="customer-phone" name="customerPhone" autocomplete="tel" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="customer-email">Email</label>
                    <input id="customer-email" name="customerEmail" type="email" autocomplete="email">
                    <p class="hint">訂單回傳確認用，非必填。</p>
                </div>

                <fieldset class="form-group">
                    <legend class="fieldset-label">取貨方式 *</legend>
                    <div class="option-grid">
                        <label class="option-pill">
                            <input type="radio" name="pickupMethod" value="工作室自取" required>
                            工作室自取
                        </label>
                        <label class="option-pill">
                            <input type="radio" name="pickupMethod" value="龍岡自取">
                            龍岡自取
                        </label>
                        <label class="option-pill">
                            <input type="radio" name="pickupMethod" value="宅配">
                            宅配
                        </label>
                        <label class="option-pill">
                            <input id="pickup-other-radio" type="radio" name="pickupMethod" value="其他">
                            其他
                        </label>
                    </div>
                    <p class="hint">選擇宅配才會計算運費。貨運速度是出貨日加 1 至 2 天，物流現在不保證出貨隔日送達，宅配務必算好日期。</p>
                    <input id="pickup-other" name="pickupOther" placeholder="若選其他，請填寫取貨方式" disabled>
                </fieldset>

                <div class="form-group">
                    <label id="customer-address-label" for="customer-address">地址</label>
                    <input id="customer-address" name="customerAddress" autocomplete="street-address">
                    <p class="hint">選擇宅配時為必填。</p>
                </div>

                <div class="form-group">
                    <label for="ship-date">出貨日期 *</label>
                    <input id="ship-date" name="shipDate" type="date" min="2026-08-13" max="2026-09-24" required>
                    <p class="hint">可選日期為 2026/8/13 至 2026/9/24。</p>
                </div>

                <fieldset class="form-group">
                    <legend class="fieldset-label">付款狀態</legend>
                    <label class="option-pill">
                        <input id="is-paid" type="checkbox" name="isPaid" value="已付款">
                        已付款
                    </label>
                    <input id="bank-last-five" name="bankLastFive" placeholder="若已付款，請填帳號後五碼" maxlength="5" disabled>
                </fieldset>

                <div class="form-group">
                    <label for="order-note">備註</label>
                    <textarea id="order-note" name="orderNote" placeholder="不需要紙盒或提袋、取貨提醒或其他需求"></textarea>
                </div>

                <p id="form-status" class="form-status" role="status"></p>

                <div class="form-actions">
                    <a class="secondary-button" href="index.html">繼續購物</a>
                    <button class="submit-button" type="submit">送出訂單</button>
                </div>
            </form>

            <aside class="order-card">
                <h2>訂購內容</h2>
                <div id="order-list" class="order-list"></div>
                <dl class="cart-summary">
                    <div>
                        <dt>商品金額</dt>
                        <dd id="checkout-subtotal">$0</dd>
                    </div>
                    <div>
                        <dt>運費</dt>
                        <dd id="checkout-shipping">$0</dd>
                    </div>
                    <div class="total-row">
                        <dt>合計</dt>
                        <dd id="checkout-total">$0</dd>
                    </div>
                </dl>
                <p id="checkout-note" class="shipping-note"></p>
            </aside>
        </section>
    </main>

    <footer>
        <p>© 2026 冰藍烘焙實驗室</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="js/checkout.js?v=4"></script>
</body>
</html>
