<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冰藍烘焙實驗室</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
    <div class="logo">
        <img src="images/logo4.png" alt="冰藍烘焙實驗室">
        <span>冰藍烘焙實驗室</span>
    </div>

    <div class="cart-btn" onclick="toggleCart()">
        🛒 <span id="cartCount">0</span>
    </div>
</header>

<main>

<section class="products">

<h2>2026 中秋限定禮盒</h2>

<div class="product-grid">

<div class="product-card">
    <img src="images/egg-yolk.jpg">
    <h3>蛋黃酥禮盒</h3>
    <p>$600</p>
    <button onclick="addProduct('蛋黃酥禮盒',600)">
        加入購物車
    </button>
</div>

<div class="product-card">
    <img src="images/taro-pastry.jpg">
    <h3>芋頭酥禮盒</h3>
    <p>$600</p>
    <button onclick="addProduct('芋頭酥禮盒',600)">
        加入購物車
    </button>
</div>

<div class="product-card">
    <img src="images/mung-bean.jpg">
    <h3>綠豆椪禮盒</h3>
    <p>$600</p>
    <button onclick="addProduct('綠豆椪禮盒',600)">
        加入購物車
    </button>
</div>    

<div class="product-card">
    <img src="images/pork-pastry.jpg">
    <h3>豆沙滷肉禮盒</h3>
    <p>$600</p>
    <button onclick="addProduct('豆沙滷肉禮盒',600)">
        加入購物車
    </button>
</div>   
    
<div class="product-card">
    <img src="images/halfhalfmixup.jpg">
    <h3>綜合禮盒</h3>
    <p>$600</p>
    <button onclick="addProduct('綜合禮盒',600)">
        加入購物車
    </button>
</div>

<div class="product-card">
    <img src="images/3q-cake.jpg">
    <h3>3Q餅禮盒</h3>
    <p>$400</p>
    <button onclick="addProduct('3Q餅',400)">
        加入購物車
    </button>
</div>    
    
<div class="product-card">
    <img src="images/product4.jpg">
    <h3>鳳梨酥禮盒</h3>
    <p>$480</p>
    <button onclick="addProduct('鳳梨酥禮盒',480)">
        加入購物車
    </button>
</div>

</div>

</section>

</main>

<div class="cart-panel" id="cartPanel">

<h3>購物車</h3>

<div id="cartItems"></div>

<hr>

<p>商品金額：$<span id="subtotal">0</span></p>

<p>運費：$<span id="shipping">90</span></p>

<p>總計：$<span id="total">90</span></p>

<p class="freeShipping">
距離免運還差 $<span id="remaining">6000</span>
</p>

</div>

<script>

let cart=[]
const FREE_SHIPPING=6000
const SHIPPING=90

function addProduct(name,price){

cart.push({
name:name,
price:price
})

updateCart()
}

function updateCart(){

let subtotal=0
let html=''

cart.forEach(item=>{

subtotal+=item.price

html+=`
<p>${item.name} - $${item.price}</p>
`
})

document.getElementById('cartItems').innerHTML=html

document.getElementById('subtotal').innerText=subtotal

let shipping=subtotal>=FREE_SHIPPING ? 0 : SHIPPING

document.getElementById('shipping').innerText=shipping

document.getElementById('total').innerText=subtotal+shipping

document.getElementById('remaining').innerText=
Math.max(0,FREE_SHIPPING-subtotal)

document.getElementById('cartCount').innerText=
cart.length
}

function toggleCart(){

document.getElementById('cartPanel')
.classList.toggle('show')

}

</script>

</body>
</html>
